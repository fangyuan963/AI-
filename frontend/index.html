<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位JD解读工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0b0f;
            --surface:   #111318;
            --surface2:  #181b22;
            --border:    #1e2330;
            --accent:    #ff6b2b;
            --accent2:   #ff9a5c;
            --accent-glow: rgba(255,107,43,0.18);
            --text:      #e8eaf0;
            --muted:     #6b7280;
            --muted2:    #4b5363;
            --green:     #34d399;
            --blue:      #60a5fa;
            --yellow:    #fbbf24;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,107,43,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,43,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .header {
            padding: 60px 0 48px;
            text-align: center;
            position: relative;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-glow);
            border: 1px solid rgba(255,107,43,0.3);
            color: var(--accent2);
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 22px;
        }

        .header-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .input-section {
            margin-bottom: 32px;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .input-label span {
            color: var(--accent);
        }

        .jd-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            line-height: 1.8;
            padding: 20px;
            resize: vertical;
            min-height: 180px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .jd-input::placeholder { color: var(--muted2); }

        .jd-input:focus {
            border-color: rgba(255,107,43,0.5);
            box-shadow: 0 0 0 3px var(--accent-glow), inset 0 0 20px rgba(255,107,43,0.02);
        }

        .input-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            justify-content: flex-end;
        }

        .primary-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .primary-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        }

        .primary-btn:hover {
            background: #ff7d40;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255,107,43,0.4);
        }

        .primary-btn:active { transform: translateY(0); }

        .secondary-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 11px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            color: var(--text);
            border-color: var(--muted2);
            background: var(--border);
        }

        .result-section {
            display: none;
        }

        .result-section.visible {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .result-title {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .stat-item {
            font-size: 12px;
            color: var(--muted2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-item strong {
            color: var(--accent2);
            font-weight: 500;
        }

        .result-content {
            display: grid;
            gap: 16px;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .result-card:hover {
            border-color: rgba(255,107,43,0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .card-icon {
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-glow);
            border: 1px solid rgba(255,107,43,0.2);
            border-radius: 7px;
            font-size: 14px;
        }

        .card-header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--text);
        }

        .card-content {
            padding: 20px;
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
        }

        .placeholder p {
            color: var(--muted2);
            font-size: 13px;
            font-style: italic;
        }

        .card-content .summary-text {
            font-size: 15px;
            color: var(--text);
            line-height: 1.8;
            padding: 4px 0;
        }

        .card-content .item-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-content .item-list li {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .item-number {
            flex-shrink: 0;
            width: 22px; height: 22px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin-top: 2px;
        }

        .item-dot {
            flex-shrink: 0;
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-top: 9px;
        }

        .item-dot.hard   { background: #f87171; }
        .item-dot.soft   { background: var(--green); }
        .item-dot.bonus  { background: var(--yellow); }

        .req-group { margin-bottom: 16px; }
        .req-group:last-child { margin-bottom: 0; }

        .req-group-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 100px;
            margin-bottom: 10px;
        }

        .req-group-title.hard  { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
        .req-group-title.soft  { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
        .req-group-title.bonus { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }

        .req-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .req-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
        }

        .translation-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .translation-item:last-child { margin-bottom: 0; }

        .translation-original {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            font-style: italic;
        }

        .translation-meaning {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .translation-example {
            font-size: 13px;
            color: var(--blue);
            padding-left: 10px;
            border-left: 2px solid rgba(96,165,250,0.3);
        }

        .question-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .question-item:last-child { border-bottom: none; padding-bottom: 0; }

        .question-num {
            flex-shrink: 0;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            width: 20px;
            margin-top: 3px;
        }

        .question-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.7;
        }

        .loading {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(10,11,15,0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .loading.active { display: flex; }

        .loading-content {
            text-align: center;
            width: 320px;
        }

        .scan-wrapper {
            position: relative;
            width: 80px; height: 80px;
            margin: 0 auto 28px;
        }

        .scan-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .scan-ring:nth-child(2) {
            inset: 10px;
            border-top-color: transparent;
            border-right-color: var(--accent2);
            animation: spin 1.4s linear infinite reverse;
        }

        .scan-ring:nth-child(3) {
            inset: 22px;
            border-top-color: rgba(255,107,43,0.4);
            animation: spin 1.8s linear infinite;
        }

        .scan-dot {
            position: absolute;
            inset: 34px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-glow);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .loading-status {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
            min-height: 20px;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 100px;
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 11px;
            color: var(--muted2);
        }

        .footer {
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-size: 12px;
            color: var(--muted2);
            letter-spacing: 0.03em;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

        @media (max-width: 600px) {
            .header { padding: 40px 0 32px; }
            .input-actions { justify-content: stretch; }
            .primary-btn, .secondary-btn { flex: 1; justify-content: center; }
            .footer-content { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-badge">AI 驱动分析</div>
            <h1 class="title">岗位 JD 解读工具</h1>
            <p class="subtitle">粘贴招聘文本，秒级拆解岗位要求与面试准备</p>
        </header>

        <section class="input-section">
            <label class="input-label"><span>▸</span> 输入岗位 JD</label>
            <textarea class="jd-input" id="jdInput" placeholder="请粘贴完整的招聘 JD 内容，支持各类格式..." rows="9"></textarea>
            <div class="input-actions">
                <button class="secondary-btn" id="clearBtn">🗑 清空</button>
                <button class="primary-btn" id="analyzeBtn">⚡ 开始解析</button>
            </div>
        </section>

        <section class="result-section" id="resultSection">
            <div class="result-header">
                <div class="result-title">▸ 解析结果</div>
                <div class="stat-item">用时 <strong id="analysisTime">--</strong> 秒</div>
            </div>
            <div class="result-content">
                <div class="result-card" id="result1">
                    <div class="card-header">
                        <div class="card-icon">💡</div>
                        <h3>一句话看懂</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>

                <div class="result-card" id="result2">
                    <div class="card-header">
                        <div class="card-icon">📋</div>
                        <h3>要你做的 3 件事</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>

                <div class="result-card" id="result3">
                    <div class="card-header">
                        <div class="card-icon">🎯</div>
                        <h3>硬门槛 / 可培养 / 加分项</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>

                <div class="result-card" id="result4">
                    <div class="card-header">
                        <div class="card-icon">🌐</div>
                        <h3>术语翻译 + 实例</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>

                <div class="result-card" id="result5">
                    <div class="card-header">
                        <div class="card-icon">❓</div>
                        <h3>面试反问 3 个问题</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>

                <div class="result-card" id="result6">
                    <div class="card-header">
                        <div class="card-icon">🔍</div>
                        <h3>面试可能被问 3 个问题</h3>
                    </div>
                    <div class="card-content">
                        <div class="placeholder"><p>点击"开始解析"后显示结果</p></div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-content">
                <p class="footer-text">© 2026 岗位JD解读工具 · MVP</p>
                <button class="secondary-btn" id="copyBtn">📋 复制全部结果</button>
            </div>
        </footer>
    </div>

    <div class="loading" id="loading">
        <div class="loading-content">
            <div class="scan-wrapper">
                <div class="scan-ring"></div>
                <div class="scan-ring"></div>
                <div class="scan-ring"></div>
                <div class="scan-dot"></div>
            </div>
            <p class="loading-title">正在解析 JD…</p>
            <p class="loading-status" id="loadingStatus">正在连接服务器</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span>解析进度</span>
                <span id="progressText">0%</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = '';   

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2400);
        }

        function setProgress(pct, status) {
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '%';
            if (status) document.getElementById('loadingStatus').textContent = status;
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            setProgress(0, '正在连接服务器…');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function renderCard(id, html) {
            document.getElementById(id).querySelector('.card-content').innerHTML = html;
        }

        function renderSummary(text) {
            return `<p class="summary-text">${text}</p>`;
        }

        function renderList(items) {
            return '<ul class="item-list">' + items.map((it, i) =>
                `<li><div class="item-number">${i+1}</div><span>${it}</span></li>`
            ).join('') + '</ul>';
        }

        function renderRequirements(hard, soft, bonus) {
            const group = (cls, label, icon, items) => items.length ? `
                <div class="req-group">
                    <div class="req-group-title ${cls}">${icon} ${label}</div>
                    <div class="req-items">${items.map(it =>
                        `<div class="req-item"><div class="item-dot ${cls}"></div><span>${it}</span></div>`
                    ).join('')}</div>
                </div>` : '';
            return group('hard','硬门槛','🔒',hard) +
                   group('soft','可培养','🌱',soft) +
                   group('bonus','加分项','⭐',bonus);
        }

        function renderTranslations(items) {
            return items.map(it => `
                <div class="translation-item">
                    <div class="translation-original">"${it.term}"</div>
                    <div class="translation-meaning">${it.meaning}</div>
                    <div class="translation-example">💬 ${it.example}</div>
                </div>`
            ).join('');
        }

        function renderQuestions(items) {
            return items.map((q, i) => `
                <div class="question-item">
                    <div class="question-num">Q${i+1}</div>
                    <div class="question-text">${q}</div>
                </div>`
            ).join('');
        }

        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const jd = document.getElementById('jdInput').value.trim();
            if (!jd) { 
                showToast('请先粘贴 JD 内容'); 
                return; 
            }

            const t0 = Date.now();
            showLoading();

            const steps = [
                [15, '解析岗位描述…'],
                [35, '提取核心职责…'],
                [55, '识别任职要求…'],
                [72, '生成面试问题…'],
                [88, '整理分析结果…'],
            ];
            let si = 0;
            const timer = setInterval(() => {
                if (si < steps.length) {
                    setProgress(steps[si][0], steps[si][1]);
                    si++;
                }
            }, 600);

            try {
                const res = await fetch(`${API_BASE_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jdContent: jd })
                });

                clearInterval(timer);
                setProgress(100, '解析完成！');
                await new Promise(r => setTimeout(r, 500));

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || '分析失败');
                }

                const result = await res.json();

                const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
                document.getElementById('analysisTime').textContent = elapsed;

                renderCard('result1', renderSummary(result.summary));
                renderCard('result2', renderList(result.top3));
                renderCard('result3', renderRequirements(result.hard, result.soft, result.bonus));
                renderCard('result4', renderTranslations(result.translations));
                renderCard('result5', renderQuestions(result.questions_ask));
                renderCard('result6', renderQuestions(result.questions_expect));

                const section = document.getElementById('resultSection');
                section.classList.add('visible');
                setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

            } catch (e) {
                clearInterval(timer);
                showToast(e.message || '解析失败，请检查输入或稍后重试');
                console.error(e);
            } finally {
                hideLoading();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('jdInput').value = '';
            document.getElementById('resultSection').classList.remove('visible');
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const cards = document.querySelectorAll('.result-card');
            let text = '';
            cards.forEach(card => {
                const title = card.querySelector('h3')?.textContent || '';
                const content = card.querySelector('.card-content')?.innerText || '';
                text += `【${title}】\n${content}\n\n`;
            });
            navigator.clipboard.writeText(text.trim())
                .then(() => showToast('✅ 已复制到剪贴板'))
                .catch(() => showToast('复制失败，请手动选择文本'));
        });
    </script>
</body>
</html>
